<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Behdaung Admin</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Google Identity Services SDK (for Google Sign-In button) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <app-root>
    <!--
      Static splash — shown from first browser paint until Angular bootstraps
      and APP_INITIALIZER completes. Angular replaces this content on first render.
      Inline styles are intentional: CSS bundles may not be parsed yet at this point.
    -->
    <div id="static-splash">
      <div id="static-splash-card">
        <div id="static-splash-logo">🏪</div>
        <p id="static-splash-title">Behdaung Admin</p>
        <p id="static-splash-sub">Starting up…</p>
        <div id="static-splash-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <style>
      #static-splash {
        position: fixed; inset: 0;
        background: #1e1b4b;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999;
      }
      #static-splash-card { text-align: center; }
      #static-splash-logo {
        font-size: 3.5rem;
        animation: splash-pulse 1.8s ease-in-out infinite;
        display: block; margin-bottom: 1rem;
      }
      #static-splash-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 1.5rem; font-weight: 700;
        color: #fff; margin: 0 0 0.375rem;
      }
      #static-splash-sub {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 0.875rem; color: #818cf8; margin: 0 0 1.5rem;
      }
      #static-splash-dots { display: flex; gap: 0.5rem; justify-content: center; }
      #static-splash-dots span {
        width: 8px; height: 8px; border-radius: 50%;
        background: #6366f1;
        animation: splash-bounce 1.2s ease-in-out infinite;
      }
      #static-splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      #static-splash-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1);   opacity: 1;   }
        50%       { transform: scale(1.1); opacity: 0.85; }
      }
      @keyframes splash-bounce {
        0%, 80%, 100% { transform: translateY(0);    opacity: 0.4; }
        40%           { transform: translateY(-8px); opacity: 1;   }
      }
    </style>
  </app-root>
</body>
</html>
